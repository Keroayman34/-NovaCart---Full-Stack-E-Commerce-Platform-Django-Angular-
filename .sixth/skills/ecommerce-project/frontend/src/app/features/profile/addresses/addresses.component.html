<div class="page">
  <div class="header">
    <h2>Addresses</h2>
    <button (click)="onAddAddress()">Add Address</button>
  </div>

  <div class="card" *ngIf="isLoading">Loading addresses...</div>

  <div class="card" *ngIf="!isLoading && errorMessage">
    <p class="error">{{ errorMessage }}</p>
  </div>

  <div class="card" *ngIf="!isLoading && !addresses.length">
    <p>No addresses saved yet.</p>
  </div>

  <div class="address-grid" *ngIf="!isLoading && addresses.length">
    <div class="card" *ngFor="let address of addresses">
      <p class="title">{{ address.street }}</p>
      <p>{{ address.city }}, {{ address.country }}</p>
      <div class="actions">
        <button (click)="onEditAddress(address)">Edit</button>
        <button class="danger" (click)="onDeleteAddress(address.id)">
          Delete
        </button>
      </div>
    </div>
  </div>

  <div class="card" *ngIf="isFormVisible">
    <app-address-form
      [address]="selectedAddress"
      (save)="onSaveAddress($event)"
      (cancel)="onCancelAddress()"
    ></app-address-form>
  </div>
</div>
