<div class="page">
  <h2>Order Details</h2>

  <div class="card" *ngIf="isLoading">Loading order...</div>

  <div class="card" *ngIf="!isLoading && errorMessage">
    <p class="error">{{ errorMessage }}</p>
  </div>

  <div class="card" *ngIf="!isLoading && order">
    <div class="summary">
      <p><strong>Order #</strong> {{ order.id }}</p>
      <p><strong>Status</strong> {{ order.status }}</p>
      <p><strong>Total</strong> ${{ order.total }}</p>
      <p><strong>Date</strong> {{ order.date | date: "mediumDate" }}</p>
    </div>

    <div class="items">
      <h3>Items</h3>
      <div class="item" *ngFor="let item of order.items">
        <div>
          <p class="name">{{ item.name }}</p>
          <p>Qty: {{ item.quantity }}</p>
        </div>
        <p>${{ item.price }}</p>
      </div>
    </div>

    <a routerLink="/profile/orders">Back to orders</a>
  </div>
</div>
