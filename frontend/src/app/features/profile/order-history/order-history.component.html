<div class="page">
  <h2>Order History</h2>

  <div class="card" *ngIf="isLoading">Loading orders...</div>

  <div class="card" *ngIf="!isLoading && errorMessage">
    <p class="error">{{ errorMessage }}</p>
  </div>

  <div class="card" *ngIf="!isLoading && !orders.length">
    <p>No orders yet.</p>
  </div>

  <div class="order-list" *ngIf="!isLoading && orders.length">
    <div class="card" *ngFor="let order of orders">
      <div class="row">
        <p class="label">Order #{{ order.id }}</p>
        <p class="status">{{ order.status }}</p>
      </div>
      <p>Total: ${{ order.total }}</p>
      <p>Date: {{ order.date | date: "mediumDate" }}</p>
      <a [routerLink]="['/profile/orders', order.id]">View details</a>
    </div>
  </div>
</div>
