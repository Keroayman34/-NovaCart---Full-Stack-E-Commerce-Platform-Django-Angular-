<div class="category-form">
  <div class="form-header">
    <h2>{{ formTitle }}</h2>
    <button class="btn-close" (click)="onCancel()" type="button">×</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-content">
    <!-- Error Alert -->
    <div class="alert alert-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="form-group">
      <label for="name">Category Name <span class="required">*</span></label>
      <input
        id="name"
        type="text"
        formControlName="name"
        placeholder="Enter category name"
        class="form-input"
        (change)="onNameChange()"
        [class.error]="form.get('name')?.invalid && form.get('name')?.touched"
      />
      <span class="error-message" *ngIf="getErrorMessage('name')">
        {{ getErrorMessage('name') }}
      </span>
    </div>

    <div class="form-group">
      <label for="description">Description <span class="required">*</span></label>
      <textarea
        id="description"
        formControlName="description"
        placeholder="Enter category description"
        class="form-textarea"
        rows="4"
        [class.error]="form.get('description')?.invalid && form.get('description')?.touched"
      ></textarea>
      <span class="error-message" *ngIf="getErrorMessage('description')">
        {{ getErrorMessage('description') }}
      </span>
    </div>

    <div class="form-group">
      <label for="slug">URL Slug <span class="required">*</span></label>
      <div class="slug-input-group">
        <input
          id="slug"
          type="text"
          formControlName="slug"
          placeholder="category-name"
          class="form-input"
          [class.error]="form.get('slug')?.invalid && form.get('slug')?.touched"
        />
        <button type="button" class="btn-generate" (click)="generateSlug()" *ngIf="mode === 'create'">
          Auto-generate
        </button>
      </div>
      <span class="error-message" *ngIf="getErrorMessage('slug')">
        {{ getErrorMessage('slug') }}
      </span>
      <span class="hint">Lowercase letters, numbers, and hyphens only</span>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">{{ submitButtonText }}</span>
        <span *ngIf="loading" class="loading">
          <span class="spinner"></span>
          Saving...
        </span>
      </button>
    </div>
  </form>
</div>
