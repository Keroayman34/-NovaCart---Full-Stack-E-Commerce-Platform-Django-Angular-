<div class="product-form">
  <div class="form-header">
    <h2>{{ formTitle }}</h2>
    <button class="btn-close" (click)="onCancel()" type="button">×</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-content">
    <div class="form-group">
      <label for="name">Product Name <span class="required">*</span></label>
      <input
        id="name"
        type="text"
        formControlName="name"
        placeholder="Enter product name"
        class="form-input"
        [class.error]="form.get('name')?.invalid && form.get('name')?.touched"
      />
      <span class="error-message" *ngIf="getErrorMessage('name')">
        {{ getErrorMessage('name') }}
      </span>
    </div>

    <div class="form-group">
      <label for="description">Description <span class="required">*</span></label>
      <textarea
        id="description"
        formControlName="description"
        placeholder="Enter product description"
        class="form-textarea"
        rows="4"
        [class.error]="form.get('description')?.invalid && form.get('description')?.touched"
      ></textarea>
      <span class="error-message" *ngIf="getErrorMessage('description')">
        {{ getErrorMessage('description') }}
      </span>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Category <span class="required">*</span></label>
        <select
          id="category"
          formControlName="category"
          class="form-select"
          [class.error]="form.get('category')?.invalid && form.get('category')?.touched"
        >
          <option value="">Select a category</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
        <span class="error-message" *ngIf="getErrorMessage('category')">
          {{ getErrorMessage('category') }}
        </span>
      </div>

      <div class="form-group">
        <label for="price">Price (₹) <span class="required">*</span></label>
        <input
          id="price"
          type="number"
          formControlName="price"
          placeholder="0.00"
          class="form-input"
          step="0.01"
          [class.error]="form.get('price')?.invalid && form.get('price')?.touched"
        />
        <span class="error-message" *ngIf="getErrorMessage('price')">
          {{ getErrorMessage('price') }}
        </span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="stock">Stock Quantity <span class="required">*</span></label>
        <input
          id="stock"
          type="number"
          formControlName="stock"
          placeholder="0"
          class="form-input"
          min="0"
          [class.error]="form.get('stock')?.invalid && form.get('stock')?.touched"
        />
        <span class="error-message" *ngIf="getErrorMessage('stock')">
          {{ getErrorMessage('stock') }}
        </span>
      </div>

      <div class="form-group">
        <label for="image_url">Product Image URL</label>
        <input
          id="image_url"
          type="text"
          formControlName="image_url"
          placeholder="https://example.com/image.jpg"
          class="form-input"
        />
        <span class="hint">Paste image URL or upload below</span>
      </div>
    </div>

    <div class="form-group">
      <label>Product Image</label>
      <div class="image-upload">
        <div class="image-preview" *ngIf="imagePreview">
          <img [src]="imagePreview" alt="Product preview" />
        </div>
        <div class="upload-area" *ngIf="!imagePreview">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path d="M21 15l-5-5L5 21" />
          </svg>
          <p>Drag and drop or click to upload</p>
        </div>
        <input type="file" accept="image/*" class="file-input" (change)="onImageChange($event)" />
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">{{ submitButtonText }}</span>
        <span *ngIf="loading" class="loading">
          <span class="spinner"></span>
          Saving...
        </span>
      </button>
    </div>
  </form>
</div>
