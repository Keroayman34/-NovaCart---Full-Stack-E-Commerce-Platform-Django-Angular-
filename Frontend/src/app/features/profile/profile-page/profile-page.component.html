<div class="page">
  <div class="header">
    <h2>Profile</h2>
    <div class="nav-links">
      <a routerLink="/profile/addresses">Addresses</a>
      <a routerLink="/profile/wishlist">Wishlist</a>
      <a routerLink="/profile/orders">Orders</a>
    </div>
  </div>

  <div class="card" *ngIf="isLoading">Loading profile...</div>

  <div class="card" *ngIf="!isLoading">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" type="text" formControlName="name" />
        <small
          *ngIf="
            profileForm.controls.name.touched &&
            profileForm.controls.name.invalid
          "
        >
          Name is required.
        </small>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" />
        <small
          *ngIf="
            profileForm.controls.email.touched &&
            profileForm.controls.email.invalid
          "
        >
          Please enter a valid email.
        </small>
      </div>

      <button type="submit" [disabled]="isSaving">Save Changes</button>
    </form>

    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </div>
</div>
