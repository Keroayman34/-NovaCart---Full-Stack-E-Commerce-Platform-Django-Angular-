<form [formGroup]="addressForm" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="street">Street</label>
    <input id="street" type="text" formControlName="street" />
    <small
      *ngIf="
        addressForm.controls.street.touched &&
        addressForm.controls.street.invalid
      "
    >
      Street is required.
    </small>
  </div>

  <div class="form-group">
    <label for="city">City</label>
    <input id="city" type="text" formControlName="city" />
    <small
      *ngIf="
        addressForm.controls.city.touched && addressForm.controls.city.invalid
      "
    >
      City is required.
    </small>
  </div>

  <div class="form-group">
    <label for="country">Country</label>
    <input id="country" type="text" formControlName="country" />
    <small
      *ngIf="
        addressForm.controls.country.touched &&
        addressForm.controls.country.invalid
      "
    >
      Country is required.
    </small>
  </div>

  <div class="actions">
    <button type="submit">Save Address</button>
    <button type="button" class="ghost" (click)="onCancel()">Cancel</button>
  </div>
</form>
