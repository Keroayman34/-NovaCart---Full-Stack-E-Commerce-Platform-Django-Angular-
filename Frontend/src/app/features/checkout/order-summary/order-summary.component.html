<section class="order-summary">
  <h3>Order Summary</h3>

  <div class="items" *ngIf="items.length; else emptyState">
    <article class="item" *ngFor="let item of items">
      <img
        class="item-image"
        [src]="item.image || 'https://via.placeholder.com/64'"
        [alt]="item.name"
      />

      <div class="item-info">
        <p class="item-name">{{ item.name }}</p>
        <p class="item-meta">Qty: {{ item.quantity }}</p>
      </div>

      <p class="item-price">{{ item.price * item.quantity | currency }}</p>
    </article>
  </div>

  <ng-template #emptyState>
    <p class="empty">Your cart is empty.</p>
  </ng-template>

  <div class="totals">
    <div class="row">
      <span>Subtotal</span>
      <strong>{{ subtotal | currency }}</strong>
    </div>
    <div class="row">
      <span>Shipping</span>
      <strong>{{ shipping | currency }}</strong>
    </div>
    <div class="row">
      <span>Tax</span>
      <strong>{{ tax | currency }}</strong>
    </div>
    <div class="row grand-total">
      <span>Total</span>
      <strong>{{ total | currency }}</strong>
    </div>
  </div>
</section>
